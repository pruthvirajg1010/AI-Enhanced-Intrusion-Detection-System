<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Enhanced Intrusion Detection</title>
    <meta name="description" content="Real-time AI-powered intrusion detection system with sleek dark interface.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
                --primary: #00ffcc;
                --accent: #007bff;
                --glass-bg: rgba(0, 0, 0, 0.6);
                --text-color: #e0e0e0;
            }
            body {
                font-family: 'Inter', sans-serif;
                background: var(--bg-gradient), url('https://www.transparenttextures.com/patterns/dark-mosaic.png');
                background-blend-mode: overlay;
                color: var(--text-color);
                margin: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow-x: hidden;
                transition: background 0.5s ease;
            }
            form {
                background: var(--glass-bg);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                padding: 2.5rem 2rem;
                border-radius: 1rem;
                width: 100%;
                max-width: 380px;
                box-shadow: 0 8px 32px rgba(0, 255, 204, 0.2);
                display: flex;
                flex-direction: column;
                gap: 1rem;
                animation: fadeIn 0.8s ease forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            h2 {
                text-align: center;
                color: var(--primary);
                margin-bottom: 0.5rem;
                font-weight: 600;
            }
            label {
                color: var(--text-color);
                font-weight: 500;
                margin-bottom: 0.25rem;
            }
            input[type=number],
            input[type=text] {
                width: 100%;
                padding: 0.75rem;
                border: none;
                border-radius: 0.5rem;
                background: #1a1a1a;
                color: var(--primary);
                outline: none;
                transition: box-shadow 0.3s ease;
            }
            input[type=number]:focus,
            input[type=text]:focus {
                box-shadow: 0 0 8px var(--primary);
            }
            input[type=submit] {
                background: linear-gradient(to right, var(--primary), var(--accent));
                color: #000;
                padding: 0.75rem;
                border: none;
                border-radius: 0.5rem;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.2s, box-shadow 0.3s;
            }
            input[type=submit]:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px var(--primary);
            }
            .prediction {
                margin-top: 1rem;
                background: var(--glass-bg);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                padding: 1rem;
                border-radius: 0.75rem;
                color: var(--primary);
                text-align: center;
                box-shadow: 0 4px 12px rgba(0,255,204,0.15);
                animation: slideUp 0.5s ease;
            }
            @keyframes slideUp {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @media (max-width: 480px) {
                body { padding: 1rem; }
                form { padding: 1.5rem 1rem; }
            }
        </style>
</head>
<body>
    <div>
        <h1>AI-Enhanced Intrusion Detection</h1>
        <form method="POST" action="/predict" role="form" id="intrusion-form">
            <label for="flow_duration">Flow Duration:</label>
            <input type="number" step="any" name="flow_duration" required>

            <label for="total_fwd_packets">Total Fwd Packets:</label>
            <input type="number" step="any" name="total_fwd_packets" required>

            <label for="total_backward_packets">Total Backward Packets:</label>
            <input type="number" step="any" name="total_backward_packets" required>

            <label for="total_length_fwd_packets">Total Length of Fwd Packets:</label>
            <input type="number" step="any" name="total_length_fwd_packets" required>

            <input type="submit" value="Predict">
        </form>

        {% if prediction %}
            <div class="prediction">
                <h3>Prediction: {{ prediction }}</h3>
            </div>
        {% endif %}
    </div>
</body>
</html>
